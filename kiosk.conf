# kiosk.conf — Video Kiosk Configuration
# Paths to external tools
PLAYER_BIN=/usr/bin/mpv
YTDLP_BIN=/usr/local/bin/yt-dlp

# Player arguments (passed directly to mpv)
#PLAYER_ARGS=--vo=drm --hwdec=v4l2m2m --no-terminal --fs --really-quiet --loop
#PLAYER_ARGS=--vo=drm --no-terminal --fs --really-quiet --ytdl-format=bestvideo[height<=1080][vcodec^=avc]+bestaudio/best[height<=1080] --loop
PLAYER_ARGS=--vo=drm --no-terminal --fs --really-quiet --no-audio --ytdl-format=bestvideo[height<=1080][vcodec^=avc]/best[height<=1080] --loop

# Seconds to ignore button input after a keypress.
# Prevents a new video from starting while the previous one is still shutting down.
INPUT_DEBOUNCE_SECONDS=7

# Video assignments for each button.
# Values can be a full path to a local file or a YouTube URL.
KEY_A=/home/pi/videos/pauls_hawaii_video.mp4
KEY_A_DESC=Paul's Hawaii Video
KEY_B=/home/pi/videos/Fireplace_10hrx265.mp4
KEY_B_DESC=Fireplace
KEY_C=/home/pi/videos/sfe-6h.mp4
KEY_C_DESC=SPACE!!!
#KEY_D=https://www.youtube.com/watch?v=LVEIsvCiUw8
KEY_D=https://www.youtube.com/watch?v=AkvJgfu8QuI
KEY_D_DESC=Some youtube nature thing
